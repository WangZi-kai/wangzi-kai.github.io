<link rel="stylesheet" href="/css/fontawesome.min.css" type="text/css" />
<meta name="description" content="hi工具，方便你的生活！" />
<meta name="keywords" content="hi,工具,方便,实用,在线,JS,JavaScript,处理,加密,不可逆加密,可逆加密,格式化,压缩,去注释,去缩进" />
<meta name="copyright" content="3429442539@qq.com" />

<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="expires" content="-1">
<link rel="shortcut icon" href="/i/favicon.ico" sizes="32x32"/>
<script src="/js/antidebugger.js"></script>
<link rel="stylesheet" href="/css/nocopy.css" type="text/css" />
</head>

<body>
<div class="container">
    <h1><i class="fa fa-lock"></i> JS 加密工具箱 · 可逆/不可逆 · 花指令 · 反调试</h1>

    <!-- 工具栏 -->
    <div class="toolbar">
        <button class="btn-primary" onclick="irreversibleEncrypt()"><i class="fa fa-bolt"></i> 不可逆加密</button>
        <button class="btn-success" onclick="reversibleEncrypt()"><i class="fa fa-recycle"></i> 可逆加密</button>
        <button class="btn-warning" onclick="formatJS()"><i class="fa fa-cubes"></i> 格式化</button>
        <button class="btn-danger" onclick="compressJS()"><i class="fa fa-file-archive-o"></i> 压缩</button>
        <button class="btn-purple" onclick="removeCommentsOnly()"><i class="fa fa-tags"></i> 去注释</button>
        <button class="btn-info" onclick="removeIndentOnly()"><i class="fa fa-arrows-h"></i> 去缩进</button>
        <button class="btn-outline" onclick="clearAll()"><i class="fa fa-trash-o"></i> 清空</button>
        <button class="btn-outline" onclick="copyOutput()"><i class="fa fa-clipboard"></i> 复制</button>
    </div>

    <!-- 选项栏 -->
    <div class="options-bar">
        <label><i class="fa fa-calculator"></i> 编码:
            <select id="encodeType">
                <option value="base64">Base64</option>
                <option value="rc4">RC4</option>
            </select>
        </label>
        <span class="sep">|</span>
        <label><input type="checkbox" id="junkSwitch"> <i class="fa fa-modx"></i> 插入花指令</label>
        <label>花指令密度:
            <input type="number" id="junkDensity" value="3" min="1" max="10">
        </label>
        <span class="sep">|</span>
        <label><input type="checkbox" id="antiDebugSwitch" checked> <i class="fa fa-minus-circle"></i> 禁止调试</label>
        <span class="sep">|</span>
        <label><input type="checkbox" id="strictMode" checked> 严格模式</label>
    </div>

    <!-- 编辑器 -->
    <div class="editor-area">
        <div class="panel">
            <div class="panel-header">
                <span><i class="fa fa-file"></i> 输入</span>
                <span class="count" id="inputCount">0 字符</span>
            </div>
            <div class="panel-body">
                <textarea id="inputCode" placeholder="粘贴你的 JavaScript 代码..." spellcheck="false"></textarea>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">
                <span><i class="fa fa-lock"></i> 输出</span>
                <span class="count" id="outputCount">0 字符</span>
            </div>
            <div class="panel-body">
                <textarea id="outputCode" placeholder="处理结果..." readonly spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="stats-bar">
        <span id="statusText"><i class="fa fa-lightbulb-o"></i> 就绪 · 支持 Base64 / RC4 编码 · 花指令 · 反调试</span>
    </div>
</div>

<div class="toast" id="toast"></div>
